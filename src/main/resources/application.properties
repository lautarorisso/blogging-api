spring.application.name=blogging-platform-api
spring.datasource.url=jdbc:postgresql://localhost:${DB_PORT:5432}/${DB_NAME:blog_db}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

security.jwt.key.secret=${JWT_SECRET}
security.jwt.user.generator=${JWT_ISSUER:auth-service}

server.port=${SERVER_PORT:8080}

logging.level.root=INFO
logging.level.com.lautarorisso.blogging_platform_api=DEBUG
logging.level.org.springframework=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN

logging.file.name=logs/blogging-platform-api.log

logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%level] %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%level] %logger{36} - %msg%n

logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=7